<!-- This is an example file for a basic input element -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Cache-Control" content="no-cache" />
    <link rel="stylesheet" href="../assets/css/ui-library--v1.css" />
    <link rel="stylesheet" href="../assets/iframe--v1.css" />
    <script src="../assets/iframe--v1.min.js"></script>
  </head>

  <body>
    <div class="TextField">
      <label id="example-label" class="input-width-medium no-bottom-margin input-text">
        <span class="label-text">Basic Example with Validation</span>

        <span class="input-container">
          <input id="example" type="text" />

          <div id="example-error" class="input-message" hidden>
            <div class="input-message__icon"></div>
            <div class="input-message__text">
              Field can not be blank
            </div>
          </div>
        </span>
      </label>
    </div>

    <script type="text/javascript">
      var hasError = false;
      var originalHeight = document.body.scrollHeight;

      /***************************************************************
       * CONFIG
       ***************************************************************/
      var MIN_LEN = 5;
      var MAX_LEN = 255;

      /***************************************************************
       * INITIALIZE
       ***************************************************************/
      CustomAttribute.onInitialize(function (data) {
        if (data && data.value) {
          document.getElementById("example").value = data.value;
        }

        if (data && data.metaData && data.metaData.displayName) {
          document.getElementsByClassName("label-text")[0].textContent =
            data.metaData.displayName;
        }

        document.getElementById("example-label").classList.add("required");

        if (data && data.value && data.value[0]) {
          document.getElementById("example-label").classList.remove("required");
          CustomAttribute.sendAttributeValidation(true);
        } else {
          CustomAttribute.sendAttributeValidation(false);
        }
      });

      /***************************************************************
       * UPDATE EVENTS
       ***************************************************************/
      CustomAttribute.onUpdate(function (data) {
        var example = document.getElementById("example");
        var thisValue = example.value;

        var newValue =
          data &&
          data.form &&
          data.form.attributes &&
          data.form.attributes[CustomAttribute.attribute] &&
          data.form.attributes[CustomAttribute.attribute][0];

        var error =
          data &&
          data.form &&
          data.form.errors &&
          data.form.errors[CustomAttribute.attribute];

        if (error) {
          showErrorState(error.message);
        }

        if (thisValue && typeof newValue === "undefined") {
          example.value = "";
          hideErrorState();
          document.getElementById("example-label").classList.add("required");
        } else if (typeof newValue !== "undefined" && thisValue !== newValue) {
          example.value = newValue;
        }
      });

      /***************************************************************
       * ERROR DISPLAY
       ***************************************************************/
      function hideErrorState() {
        if (!hasError) return;

        document.getElementById("example-error").hidden = true;
        document.getElementById("example-label").classList.remove("input-message");
        CustomAttribute.resize(originalHeight);
        hasError = false;
      }

      function showErrorState(message) {
        document.getElementById("example-error").hidden = false;
        document.getElementById("example-label").classList.add("input-message");

        if (message) {
          document.getElementsByClassName("input-message__text")[0].textContent =
            message;
        }

        CustomAttribute.resize(originalHeight + 42);
        hasError = true;
      }

      /***************************************************************
       * VALIDATION UTILITIES
       ***************************************************************/
      function normalize(text) {
        return text.trim().replace(/\s+/g, " ");
      }

      function splitWords(text) {
        return text.toLowerCase().split(/\s+/);
      }

      function cleanWord(word) {
        return word.replace(/[^a-z]/g, "");
      }

      function isNumber(word) {
        return /^\d{5,}$/.test(word);
      }

      function isSingleLetter(word) {
        return /^[a-z]$/i.test(word);
      }

      // ============================
      // WORD VALIDATION
      // ============================
      function isValidWord(word) {
        var letters = cleanWord(word);
        if (!letters) return false;

        if (letters.length === 1) return false;
        if (letters.length === 2) return true;

        var vowels = letters.match(/[aeiouy]/g) || [];
        var ratio = vowels.length / letters.length;

        if (ratio < 0.2) return false;
        if (/[^aeiouy]{5,}/.test(letters)) return false;
        if (/(\w{2,})\1/.test(letters)) return false;
        if (/^(.)(.)\1\2/.test(letters)) return false;

        return true;
      }

      // ============================
      // HUMAN TEXT VALIDATION
      // ============================
      function isLikelyHumanTextAdvanced(text) {
        var words = splitWords(text);

        var valid = 0;
        var invalid = 0;
        var singleLetterCount = 0;

        for (var i = 0; i < words.length; i++) {
          var word = words[i];

          if (isSingleLetter(word)) {
            singleLetterCount++;
            if (singleLetterCount > 2) return false;
            continue;
          }

          if (isNumber(word)) {
            valid++;
            continue;
          }

          if (isValidWord(word)) {
            valid++;
          } else {
            invalid++;
            if (invalid > Math.floor(words.length / 2)) return false;
          }
        }

        if (valid < 2) return false;
        if (valid / words.length < 0.6) return false;

        var freq = {};
        for (var j = 0; j < words.length; j++) {
          var w = words[j];
          freq[w] = (freq[w] || 0) + 1;
        }

        for (var key in freq) {
          if (freq[key] > Math.max(2, words.length * 0.6)) {
            return false;
          }
        }

        return true;
      }

      /***************************************************************
       * MAIN VALIDATION 
       ***************************************************************/
      function validateInput(value) {
        var input = normalize(value);

        if (!input) return "Field cannot be empty.";

        if (input.length < MIN_LEN)
          return "Must be at least " + MIN_LEN + " characters.";

        if (input.length > MAX_LEN)
          return "Must not exceed " + MAX_LEN + " characters.";

        if (
          !/^[A-Za-z0-9][A-Za-z0-9@#.,;:_()'"-]*(?:\s+[A-Za-z0-9@#.,;:_()'"-]+)+[.!?]?$/.test(
            input
          )
        ) {
          return "Enter a valid sentence.";
        }

        if (!isLikelyHumanTextAdvanced(input))
          return "Please enter meaningful text.";

        return null;
      }

      /***************************************************************
       * VALIDATION HANDLER
       ***************************************************************/
      function handleChange(event) {
        var rawValue = event.target.value;

        CustomAttribute.sendAttributeValue(rawValue);

        var error = validateInput(rawValue);

        if (error) {
          showErrorState(error);
          CustomAttribute.sendAttributeValidation(false);
          document.getElementById("example-label").classList.add("required");
          return;
        }

        hideErrorState();
        document.getElementById("example-label").classList.remove("required");
        CustomAttribute.sendAttributeValidation(true);
      }

      /***************************************************************
       * EVENT WIRING
       ***************************************************************/
      document.addEventListener("DOMContentLoaded", function () {
        document
          .getElementById("example")
          .addEventListener("input", handleChange);
      });
    </script>
  </body>
</html>
