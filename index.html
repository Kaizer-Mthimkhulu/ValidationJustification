<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Advanced Validation Form</title>

<style>
  body {
    font-family: Arial;
    padding: 40px;
    background: #f5f5f5;
  }

  .TextField {
    max-width: 420px;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 10px;
    border: 2px solid #ccc;
    border-radius: 6px;
  }

  .error input {
    border-color: red;
  }

  .input-message {
    color: red;
    margin-top: 6px;
    font-size: 13px;
  }

  button {
    padding: 10px 20px;
    background: #0078d4;
    color: white;
    border: none;
    border-radius: 6px;
  }

  .success {
    margin-top: 15px;
    color: green;
    font-weight: bold;
  }
</style>
</head>

<body>

<form id="form">
  <div class="TextField" id="field">
    <label>
      <strong>Reason / Comment</strong>
      <input id="input" type="text"
        placeholder="e.g. Updating my number to 0712334356" />
      <div id="error" class="input-message" hidden></div>
    </label>
  </div>

  <button type="submit">Submit</button>

  <div id="success" class="success" hidden>
    ✅ Form submitted successfully!
  </div>
</form>

<script>
// ============================
// CONFIG
// ============================

const MIN_LEN = 5;
const MAX_LEN = 255;

const SENTENCE_REGEX =
/^[A-Za-z0-9][A-Za-z0-9@#.,;:_()'"-]*(?:\s+[A-Za-z0-9@#.,;:_()'"-]+)+[.!?]?$/;

// ============================
// UTILITIES
// ============================

function normalize(text) {
  return text.trim().replace(/\s+/g, " ");
}

function splitWords(text) {
  return text.toLowerCase().split(/\s+/);
}

function cleanWord(word) {
  return word.replace(/[^a-z]/g, "");
}

function isNumber(word) {
  return /^\d{5,}$/.test(word);
}

function isSingleLetter(word) {
  return /^[a-z]$/i.test(word);
}

// ============================
// WORD VALIDATION
// ============================

function isValidWord(word) {
  const letters = cleanWord(word);
  if (!letters) return false;

  if (letters.length === 1) return false;
  if (letters.length === 2) return true;

  const vowels = letters.match(/[aeiouy]/g) || [];
  const ratio = vowels.length / letters.length;

  if (ratio < 0.2) return false;

  if (/[^aeiouy]{5,}/.test(letters)) return false;
  if (/(\w{2,})\1/.test(letters)) return false;
  if (/^(.)(.)\1\2/.test(letters)) return false;

  return true;
}

// ============================
// HUMAN TEXT VALIDATION
// ============================

function isLikelyHumanText(text) {
  const words = splitWords(text);

  let valid = 0;
  let invalid = 0;
  let singleLetterCount = 0;

  for (let word of words) {

    if (isSingleLetter(word)) {
      singleLetterCount++;
      if (singleLetterCount > 2) return false;
      continue;
    }

    if (isNumber(word)) {
      valid++;
      continue;
    }

    if (isValidWord(word)) {
      valid++;
    } else {
      invalid++;
      if (invalid > Math.floor(words.length / 2)) return false;
    }
  }

  if (valid < 2) return false;
  if (valid / words.length < 0.6) return false;

  // Repeated word control (balanced)
  const freq = {};
  for (let w of words) {
    freq[w] = (freq[w] || 0) + 1;
  }

  if (Object.values(freq).some(count => count > Math.max(2, words.length * 0.6))) {
    return false;
  }

  return true;
}

// ============================
// MAIN VALIDATION
// ============================

function validateInput(value) {
  const input = normalize(value);

  if (!input) return "Field cannot be empty.";

  if (input.length < MIN_LEN)
    return `Must be at least ${MIN_LEN} characters.`;

  if (input.length > MAX_LEN)
    return `Must not exceed ${MAX_LEN} characters.`;

  if (!SENTENCE_REGEX.test(input))
    return "Enter a valid sentence.";

  if (!isLikelyHumanText(input))
    return "Please enter meaningful text.";

  return null;
}

// ============================
// UI LOGIC
// ============================

const inputEl = document.getElementById("input");
const errorEl = document.getElementById("error");
const fieldEl = document.getElementById("field");
const successEl = document.getElementById("success");
const formEl = document.getElementById("form");

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.hidden = false;
  fieldEl.classList.add("error");
}

function clearError() {
  errorEl.hidden = true;
  fieldEl.classList.remove("error");
}

function validateAndRender(value) {
  const error = validateInput(value);

  if (error) {
    showError(error);
    return false;
  }

  clearError();
  return true;
}

// ============================
// EVENTS
// ============================

inputEl.addEventListener("input", e => {
  validateAndRender(e.target.value);
  successEl.hidden = true;
});

formEl.addEventListener("submit", e => {
  e.preventDefault();

  const value = inputEl.value;

  if (!validateAndRender(value)) {
    successEl.hidden = true;
    return;
  }

  console.log("Submitted:", value);

  successEl.hidden = false;
  inputEl.value = "";
});
</script>

</body>
</html>
